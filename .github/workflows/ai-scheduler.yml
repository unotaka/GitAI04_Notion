name: AI Notion Monitor & Developer Loop

on:
  #schedule:
  #  # 15分ごとに自動起動 (UTC基準。毎時 0, 15, 30, 45分に実行)
  #  - cron: '*/15 * * * *'
  workflow_dispatch: # GitHub画面からいつでも手動で即座に実行できるボタンを設置

# ワークフローがリポジトリへの書き込みやPR作成を行えるよう権限を定義[cite: 1]
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  ai-development-flow:
    runs-on: ubuntu-latest[cite: 1]

    steps:
      # 1. コードのチェックアウト[cite: 1]
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # すべての分岐履歴を取得[cite: 1]

      # 2. 自動化スクリプト実行用の Node.js 環境セットアップ
      # ※アプリケーション自体の開発言語・環境はNotionを参照してClaudeが動的に対応します
      - name: Setup Node.js for Automation Scripts
        uses: actions/setup-node@v4
        with:
          node-version: 20[cite: 1]

      # 3. 必須自動化ツールのインストール[cite: 1]
      - name: Install Automation Dependencies
        run: |
          npm install @notionhq/client
          npm install -g @anthropic-ai/claude-code
          echo "💡 開発言語や環境のセットアップは、Notionの記載内容に基づきClaude Codeが動的に処理します。"

      # 4. Notionに「Claude生成待ち」のタスクがないかポーリング（チェック）[cite: 1]
      - name: Check Notion Database
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/cron-scheduler.js[cite: 1]

      # 5. 【条件分岐】タスクがある場合のみ、かんばんの「タスクID」名でGitブランチを作成・切り替え[cite: 1]
      - name: Create Feature Branch
        if: env.TASK_ID != ''
        run: |
          git config --global user.name "Claude Developer Bot"
          git config --global user.email "claude-bot@yourdomain.local"
          git checkout -B feature/${{ env.TASK_ID }}[cite: 1]

      # 6. 【条件分岐】Claude Codeによるソースコードの自動生成（Notionの環境情報を参照）[cite: 1]
      - name: Run Claude Coder
        if: env.TASK_ID != ''
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}[cite: 1]
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_CODE_NON_INTERACTIVE: "true"[cite: 1]
        run: |
          # スクリプト内でNotionから「開発環境・言語情報」と「要件」を取得し、
          # claudeコマンドにコンテキストとして渡して実行させます[cite: 1]
          node scripts/claude-coder.js

      # 7. 成果物をブランチへコミットし、リモートへ強制プッシュ[cite: 1]
      - name: Push Code
        if: always() && env.TASK_ID != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "🤖 自動生成: Notionタスク ${{ env.TASK_ID }} の実装コード"
          
          git push -u origin feature/${{ env.TASK_ID }} --force[cite: 1]

      # 8. 【条件分岐】すべての工程が完了したら、Notionのステータスを「Git格納済み」に更新[cite: 1]
      - name: Update Notion Status to Git Stored
        if: env.TASK_ID != ''
        run: |
          # JSONファイルから PAGE_ID をノードのワンライナーで安全に抽出[cite: 1]
          PAGE_ID=$(node -e "console.log(require('./task_info.json').PAGE_ID)")[cite: 1]
          
          echo "📝 Notionのタスク（ページID: $PAGE_ID）を『Git格納済み』に更新中..."[cite: 1]
          
          curl -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data '{
              "properties": {
                "ステータス": {
                  "status": {
                    "name": "Git格納済み"
                  }
                }
              }
            }'[cite: 1]
          
          echo "🎉 すべての自動化プロセスが正常に完了しました！"[cite: 1]
